<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4SC CrossFit 會員訓練平台</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --dark: #080d1a; --dark2: #0f1628; --dark3: #162040;
  --cyan: #22d3ee; --orange: #f97316; --white: #f8fafc; --gray: #94a3b8;
}
body { font-family: 'Noto Sans TC', sans-serif; background: var(--dark); color: var(--white); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
.logo { font-size: 1.4rem; font-weight: 900; margin-bottom: 48px; text-align: center; }
.logo span { color: var(--cyan); }
.card {
  background: var(--dark2); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px; padding: 48px 40px; width: 100%; max-width: 420px; text-align: center;
}
h1 { font-size: 1.4rem; font-weight: 900; margin-bottom: 8px; }
.subtitle { color: var(--gray); font-size: 0.9rem; margin-bottom: 36px; line-height: 1.7; }
.google-btn {
  display: flex; align-items: center; justify-content: center; gap: 12px;
  width: 100%; padding: 16px; border-radius: 12px;
  background: var(--white); color: #1e293b;
  font-weight: 700; font-size: 0.95rem; cursor: pointer; border: none;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
}
.google-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
.google-btn svg { width: 20px; height: 20px; flex-shrink: 0; }
.divider { margin: 28px 0; border: none; border-top: 1px solid rgba(255,255,255,0.08); }
.note { font-size: 0.78rem; color: var(--gray); line-height: 1.8; }
.note strong { color: rgba(255,255,255,0.6); }
#error-msg { display: none; color: #f87171; font-size: 0.85rem; margin-top: 16px; }
</style>
</head>
<body>

<div class="logo">4SC <span>CrossFit</span> 會員平台</div>

<div class="card">
  <h1>會員登入</h1>
  <p class="subtitle">查看本週課表、換算訓練重量<br>記錄你的每次進步</p>

  <button class="google-btn" onclick="signInWithGoogle()">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    使用 Google 帳號登入
  </button>

  <div id="error-msg"></div>

  <hr class="divider">
  <p class="note">
    <strong>第一次登入？</strong><br>
    登入後需填寫本名，等待教練確認你是現有學員後即可使用。<br><br>
    場館：永和館・新店館
  </p>
</div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function signInWithGoogle() {
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/onboarding.html' }
  });
  if (error) {
    document.getElementById('error-msg').style.display = 'block';
    document.getElementById('error-msg').textContent = '登入失敗：' + error.message;
  }
}

// If already logged in, redirect
sb.auth.getSession().then(({ data: { session } }) => {
  if (session) checkMemberStatus(session.user);
});

async function checkMemberStatus(user) {
  const { data } = await sb.from('members').select('status').eq('id', user.id).single();
  if (!data) { window.location.href = 'onboarding.html'; return; }
  if (data.status === 'approved') { window.location.href = 'dashboard.html'; return; }
  if (data.status === 'pending') { window.location.href = 'pending.html'; return; }
}
</script>
</body>
</html>
