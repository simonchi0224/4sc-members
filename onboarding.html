<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>填寫資料｜4SC CrossFit 會員平台</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --dark: #080d1a; --dark2: #0f1628; --cyan: #22d3ee; --orange: #f97316; --white: #f8fafc; --gray: #94a3b8; }
body { font-family: 'Noto Sans TC', sans-serif; background: var(--dark); color: var(--white); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
.card { background: var(--dark2); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 48px 40px; width: 100%; max-width: 460px; }
.logo { font-size: 1rem; font-weight: 900; margin-bottom: 32px; color: var(--gray); }
.logo span { color: var(--cyan); }
h1 { font-size: 1.3rem; font-weight: 900; margin-bottom: 8px; }
.subtitle { color: var(--gray); font-size: 0.88rem; margin-bottom: 32px; line-height: 1.7; }
.form-group { margin-bottom: 20px; }
label { display: block; font-size: 0.82rem; font-weight: 700; color: var(--gray); margin-bottom: 8px; letter-spacing: 0.5px; }
input, select { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 14px 16px; color: var(--white); font-size: 0.95rem; font-family: inherit; outline: none; transition: border-color 0.2s; }
input:focus, select:focus { border-color: var(--cyan); }
select option { background: #1e293b; }
.submit-btn { width: 100%; padding: 16px; border-radius: 12px; background: var(--orange); color: var(--white); font-weight: 800; font-size: 1rem; border: none; cursor: pointer; margin-top: 8px; transition: background 0.2s; font-family: inherit; }
.submit-btn:hover { background: #ea580c; }
.submit-btn:disabled { background: #475569; cursor: not-allowed; }
#msg { margin-top: 16px; font-size: 0.85rem; text-align: center; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">4SC <span>CrossFit</span></div>
  <h1>填寫會員資料</h1>
  <p class="subtitle">教練需要確認你是現有學員後，才能開放使用。<br>請填寫你在場館登記的真實姓名。</p>
  <div style="margin-bottom:24px;padding:14px 16px;background:rgba(34,211,238,0.07);border:1px solid rgba(34,211,238,0.2);border-radius:12px;font-size:0.82rem;color:#7dd3fc;line-height:1.7;">
    ℹ️ 本平台僅供<strong style="color:var(--cyan);">現有有效的團體課程或教練課程會員</strong>使用。<br>
    送出後系統將自動比對會員資格，未通過者無法開通使用。
  </div>

  <form onsubmit="submitForm(event)">
    <div class="form-group">
      <label>真實姓名 <span style="color:var(--orange);">*必填</span></label>
      <input type="text" id="real-name" placeholder="例：陳小明" required style="border-color:rgba(249,115,22,0.4);">
      <div style="margin-top:8px;padding:10px 12px;background:rgba(249,115,22,0.08);border:1px solid rgba(249,115,22,0.25);border-radius:8px;font-size:0.78rem;color:#fb923c;line-height:1.6;">
        ⚠️ 請填寫你在場館<strong>合約上的真實姓名</strong>，教練需要用姓名比對會員資格。<br>
        暱稱或英文名無法通過審核。
      </div>
    </div>
    <div class="form-group">
      <label>訓練場館（可多選）</label>
      <div style="display:flex;flex-direction:column;gap:10px;margin-top:4px;">
        <label style="display:flex;align-items:center;gap:10px;color:var(--white);font-size:0.95rem;font-weight:400;cursor:pointer;margin:0;">
          <input type="checkbox" id="loc-xindian" value="xindian" style="width:18px;height:18px;accent-color:var(--cyan);flex-shrink:0;">
          新店館（CrossFit）
        </label>
        <label style="display:flex;align-items:center;gap:10px;color:var(--white);font-size:0.95rem;font-weight:400;cursor:pointer;margin:0;">
          <input type="checkbox" id="loc-yonghe" value="yonghe" style="width:18px;height:18px;accent-color:var(--cyan);flex-shrink:0;">
          永和館（混合健身）
        </label>
      </div>
    </div>
    <div class="form-group">
      <label>性別（用於 Rx 重量換算）</label>
      <select id="gender" required>
        <option value="">請選擇</option>
        <option value="male">男</option>
        <option value="female">女</option>
      </select>
    </div>
    <div class="form-group">
      <label>生日（選填，用於分齡訓練建議）</label>
      <input type="date" id="birthday" placeholder="yyyy-mm-dd">
    </div>
    <div class="form-group" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div>
        <label>身高 cm（選填）</label>
        <input type="number" id="height" placeholder="例：175" min="100" max="250">
      </div>
      <div>
        <label>體重 kg（選填）</label>
        <input type="number" id="weight" placeholder="例：70" min="30" max="200">
      </div>
    </div>
    <button class="submit-btn" type="submit" id="submit-btn">送出等待教練審核</button>
    <div id="msg"></div>
    <div id="warn-box" style="display:none;margin-top:16px;padding:16px;background:rgba(251,146,60,0.1);border:1px solid rgba(251,146,60,0.35);border-radius:12px;">
      <div style="font-size:0.85rem;color:#fb923c;line-height:1.7;margin-bottom:14px;">
        ⚠️ <strong>系統未查詢到你的有效會員資格</strong><br>
        有可能是後台資料尚未同步，或姓名填寫與合約不符。<br>
        仍可送出申請，但建議同時聯繫客服人員確認資格，以免影響審核進度。
      </div>
      <button type="button" id="confirm-btn" class="submit-btn" style="margin-top:0;background:#f97316;">確認送出申請</button>
    </div>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let _payload = null;

function buildPayload(user) {
  const locs = ['xindian','yonghe'].filter(v => document.getElementById('loc-'+v).checked);
  const birthdayVal = document.getElementById('birthday').value;
  const heightVal = document.getElementById('height').value;
  const weightVal = document.getElementById('weight').value;
  const p = {
    id: user.id,
    email: user.email,
    real_name: document.getElementById('real-name').value.trim(),
    location: locs.join(','),
    gender: document.getElementById('gender').value,
    status: 'pending'
  };
  if (birthdayVal) p.birthday = birthdayVal;
  if (heightVal) p.height_cm = parseFloat(heightVal);
  if (weightVal) p.weight_kg = parseFloat(weightVal);
  return p;
}

async function doSubmit(payload) {
  const btn = document.getElementById('submit-btn');
  const confirmBtn = document.getElementById('confirm-btn');
  const msg = document.getElementById('msg');
  if (confirmBtn) confirmBtn.disabled = true;

  const { error } = await sb.from('members').upsert(payload);
  if (error) {
    msg.style.color = '#f87171';
    msg.textContent = '送出失敗：' + error.message;
    btn.disabled = false;
    btn.textContent = '送出等待教練審核';
    if (confirmBtn) confirmBtn.disabled = false;
  } else {
    window.location.href = 'pending.html';
  }
}

async function submitForm(e) {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const msg = document.getElementById('msg');
  const warnBox = document.getElementById('warn-box');

  msg.textContent = '';
  warnBox.style.display = 'none';

  const locs = ['xindian','yonghe'].filter(v => document.getElementById('loc-'+v).checked);
  if (!locs.length) {
    msg.style.color = '#f87171';
    msg.textContent = '請至少選擇一個場館';
    return;
  }

  btn.disabled = true;
  btn.textContent = '查詢資格中…';

  const { data: { user } } = await sb.auth.getUser();
  if (!user) { window.location.href = 'index.html'; return; }

  _payload = buildPayload(user);

  // Check if name exists in approved members
  const { data: match } = await sb.from('members')
    .select('id')
    .eq('real_name', _payload.real_name)
    .eq('status', 'approved')
    .maybeSingle();

  if (match) {
    // Found — submit directly
    await doSubmit(_payload);
  } else {
    // Not found — show warning, let user confirm
    btn.disabled = false;
    btn.textContent = '送出等待教練審核';
    warnBox.style.display = 'block';
    warnBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

document.getElementById('confirm-btn').addEventListener('click', async () => {
  if (_payload) await doSubmit(_payload);
});
</script>
</body>
</html>
