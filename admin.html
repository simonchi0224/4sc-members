<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教練後台｜4SC CrossFit</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=block" rel="stylesheet">
<style>
:root {
  --paper: #ffffff;
  --ink: #0a0a0a;
  --ink-2: #1a1a1a;
  --ink-mute: #4a4a4a;
  --rule: #0a0a0a;
  --rule-soft: #d4d4d4;
  --rule-faint: #ececec;
  --bg-soft: #f6f6f4;
  --accent: #e8ff00;
  --accent-deep: #d4e600;
  --warn: #ff5a36;
  --green: #16a34a;
  --red: #ff5a36;
  --sans: 'Geist','Noto Sans TC',-apple-system,'PingFang TC',sans-serif;
  --mono: 'JetBrains Mono',ui-monospace,Menlo,monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;}
a{color:inherit;text-decoration:none}
button{font:inherit;cursor:pointer;background:none;border:0;padding:0}

/* ── Top bar ── */
.topbar{
  position:sticky;top:0;z-index:50;
  background:var(--ink);color:#fff;
  padding:14px 28px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:3px solid var(--ink);
}
.brand{
  font-family:var(--mono);font-weight:700;font-size:13px;
  letter-spacing:0.18em;display:flex;align-items:center;gap:10px;
}
.brand .dot{
  width:9px;height:9px;border-radius:50%;background:var(--accent);
  display:inline-block;
}
.topbar-right{display:flex;align-items:center;gap:12px;}
#admin-email{font-family:var(--mono);font-size:11px;color:rgba(255,255,255,.5);letter-spacing:.05em;}

/* ── Tab bar ── */
.tab-bar{
  display:flex;gap:0;
  border-bottom:2px solid var(--ink);
  background:var(--paper);
  position:sticky;top:56px;z-index:49;
  overflow-x:auto;scrollbar-width:none;
  padding:0 28px;
}
.tab-bar::-webkit-scrollbar{display:none}
.tab{
  position:relative;padding:16px 0;margin-right:28px;
  font-size:13px;font-weight:600;color:#9a9a9a;
  white-space:nowrap;cursor:pointer;transition:color .2s;
  font-family:var(--mono);letter-spacing:.05em;text-transform:uppercase;
  background:none;border:none;
}
.tab:first-child{margin-left:0;}
.tab.active{color:var(--ink);}
.tab.active::after{
  content:'';position:absolute;bottom:-2px;left:0;right:0;height:3px;
  background:var(--ink);
}

/* ── Wrap ── */
.wrap{max-width:1200px;margin:0 auto;padding:32px 28px 80px;}

/* ── Section label ── */
.section-label{
  font-family:var(--mono);font-size:10.5px;font-weight:700;
  letter-spacing:.14em;text-transform:uppercase;color:var(--ink-mute);
  margin-bottom:16px;
}

/* ── Member filter bar ── */
.member-filter-bar{
  display:flex;gap:8px;flex-wrap:wrap;
  margin-bottom:24px;padding-bottom:24px;
  border-bottom:1px solid var(--rule-faint);
}
.mf-btn{
  padding:9px 18px;border-radius:0;
  border:1.5px solid var(--rule-soft);
  background:var(--paper);color:var(--ink-mute);
  font-size:12px;font-weight:700;font-family:var(--mono);
  letter-spacing:.06em;text-transform:uppercase;cursor:pointer;
  transition:all .15s;
}
.mf-btn:hover{border-color:var(--ink);color:var(--ink);}
.mf-btn.active{background:var(--ink);color:var(--accent);border-color:var(--ink);}
.mf-count{
  display:inline-block;background:rgba(0,0,0,.08);
  border-radius:2px;padding:1px 6px;font-size:10px;margin-left:6px;font-weight:800;
}
.mf-btn.active .mf-count{background:rgba(232,255,0,.25);}
.mf-count-warn{background:rgba(255,90,54,.15);color:var(--warn);}
.mf-btn.active .mf-count-warn{background:rgba(255,90,54,.35);}

/* ── Search ── */
.search-wrap{margin-bottom:20px;}
.search-input{
  width:100%;padding:11px 16px;
  border:1.5px solid var(--rule-soft);border-radius:0;
  font-size:13px;font-family:var(--mono);
  background:var(--paper);color:var(--ink);
  outline:none;transition:border-color .15s;
}
.search-input:focus{border-color:var(--ink);}
.search-input::placeholder{color:#bbb;}

/* ── Member table ── */
.table-wrap{overflow-x:auto;}
.member-table{width:100%;border-collapse:collapse;min-width:700px;}
.member-table thead{border-bottom:2px solid var(--ink);}
.member-table th{
  text-align:left;font-size:10.5px;font-weight:700;
  font-family:var(--mono);letter-spacing:.12em;text-transform:uppercase;
  color:var(--ink-mute);padding:10px 14px;white-space:nowrap;
}
.member-row{border-bottom:1px solid var(--rule-faint);}
.member-row:hover{background:var(--bg-soft);}
.member-row td{padding:13px 14px;font-size:13px;vertical-align:middle;white-space:nowrap;}
.member-row td.td-name{white-space:normal;min-width:130px;max-width:220px;}
.member-row td.td-email{color:var(--ink-mute);font-size:11px;font-family:var(--mono);max-width:200px;overflow:hidden;text-overflow:ellipsis;}
.th-sort{cursor:pointer;user-select:none;}
.th-sort:hover{color:var(--ink);}

/* ── Status badges ── */
.status-badge{
  display:inline-block;padding:2px 10px;border-radius:0;
  font-size:10px;font-weight:800;font-family:var(--mono);
  letter-spacing:.08em;text-transform:uppercase;
}
.status-pending{background:rgba(255,90,54,.1);color:var(--warn);border:1px solid rgba(255,90,54,.3);}
.status-approved{background:rgba(22,163,74,.1);color:var(--green);border:1px solid rgba(22,163,74,.3);}
.status-rejected{background:rgba(255,90,54,.08);color:var(--warn);border:1px solid rgba(255,90,54,.2);}
.status-suspended{background:rgba(0,0,0,.05);color:var(--ink-mute);border:1px solid var(--rule-soft);}

/* ── Action buttons ── */
.action-btn{
  display:inline-block;padding:6px 14px;
  font-size:11px;font-weight:700;font-family:var(--mono);
  letter-spacing:.06em;cursor:pointer;border:1.5px solid;
  margin-right:6px;transition:all .15s;
}
.approve-btn{border-color:rgba(22,163,74,.4);color:var(--green);background:rgba(22,163,74,.06);}
.approve-btn:hover{background:var(--green);color:#fff;border-color:var(--green);}
.reject-btn{border-color:rgba(255,90,54,.3);color:var(--warn);background:rgba(255,90,54,.06);}
.reject-btn:hover{background:var(--warn);color:#fff;border-color:var(--warn);}

/* ── Expires date input ── */
.date-input{
  background:var(--bg-soft);border:1px solid var(--rule-soft);
  color:var(--ink);font-size:11px;font-family:var(--mono);
  padding:4px 8px;outline:none;cursor:pointer;
}
.date-input:focus{border-color:var(--ink);}

/* ── Note textarea ── */
.note-textarea{
  width:100%;margin-top:6px;padding:5px 8px;
  background:var(--bg-soft);border:1px solid var(--rule-faint);
  color:var(--ink-mute);font-size:11px;font-family:var(--mono);
  resize:none;outline:none;
}
.note-textarea:focus{border-color:var(--ink-mute);}

/* ── Empty state ── */
.empty-state{
  color:var(--ink-mute);font-size:12px;
  font-family:var(--mono);padding:32px 14px;letter-spacing:.05em;
}

/* ── Section hide/show ── */
.s{display:none;}
.s.active{display:block;}

/* ── WOD Editor ── */
.wod-card{
  border:1.5px solid var(--rule-soft);background:var(--paper);
  padding:24px;margin-bottom:12px;
}
.wod-card.today-card{border-color:var(--ink);border-width:2px;}
.day-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.day-label{font-weight:900;font-size:14px;font-family:var(--mono);letter-spacing:.05em;text-transform:uppercase;}
.day-label.is-today{color:var(--ink);background:var(--accent);padding:4px 10px;display:inline-block;}
.field-group{margin-bottom:14px;}
.field-label{
  font-size:10px;font-weight:700;font-family:var(--mono);
  letter-spacing:.12em;text-transform:uppercase;color:var(--ink-mute);
  margin-bottom:6px;
}
.field-input{
  width:100%;background:var(--bg-soft);border:1px solid var(--rule-soft);
  padding:10px 12px;color:var(--ink);font-size:13px;font-family:var(--sans);
  outline:none;resize:vertical;transition:border-color .15s;
}
.field-input:focus{border-color:var(--ink);}
.save-all-btn{
  background:var(--ink);color:var(--accent);border:none;
  padding:14px 32px;font-weight:800;font-size:13px;font-family:var(--mono);
  letter-spacing:.1em;text-transform:uppercase;cursor:pointer;
  margin-top:12px;transition:opacity .2s;
}
.save-all-btn:hover{opacity:.85;}
#save-status{
  font-size:11px;font-family:var(--mono);color:var(--green);
  margin-left:16px;letter-spacing:.05em;
}

/* ── Week accordion ── */
.week-group{border:1.5px solid var(--rule-soft);margin-bottom:8px;}
.week-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;cursor:pointer;background:var(--bg-soft);
  user-select:none;font-family:var(--mono);font-size:12px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;
}
.week-header.current{background:var(--accent);color:var(--ink);}
.week-body{display:none;padding:12px;}
.week-body.open{display:block;}

/* ── Mobile ── */
@media(max-width:640px){
  .topbar{padding:12px 16px;}
  .wrap{padding:20px 14px 60px;}
  .tab-bar{padding:0 14px;}
  .tab{margin-right:18px;font-size:12px;}

  /* Member filter buttons wrap */
  .member-filter-bar{gap:6px;}
  .mf-btn{padding:7px 12px;font-size:11px;}

  /* Hide table, show card layout */
  .member-table thead{display:none;}
  .member-table,.member-table tbody,.member-row,.member-row td{
    display:block;width:100%;
  }
  .member-row{
    border:1.5px solid var(--rule-soft);
    margin-bottom:10px;padding:14px;
  }
  .member-row:hover{background:var(--bg-soft);}
  .member-row td{
    padding:4px 0;white-space:normal;border:none;
    font-size:13px;
  }
  .member-row td.td-email{font-size:11px;word-break:break-all;}
  .table-wrap{overflow-x:unset;}

  /* Action buttons full-width on mobile */
  .action-btn{
    display:block;width:100%;margin-right:0;margin-bottom:6px;
    text-align:center;padding:10px 14px;
  }

  /* Date input full width */
  .date-input{width:100%;padding:8px 10px;font-size:13px;}

  /* Note textarea */
  .note-textarea{font-size:12px;}

  /* WOD editor */
  .wod-card{padding:16px;}
  .week-header{padding:12px 14px;font-size:11px;}
  .week-body{padding:8px;}
  .field-input{font-size:13px;padding:9px 10px;}
  .save-all-btn{width:100%;padding:16px;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <span class="dot"></span>4SC · ADMIN
  </div>
  <div class="topbar-right" style="display:flex;align-items:center;gap:16px;">
    <a href="dashboard.html" style="font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.2);border-radius:999px;padding:6px 14px;transition:color .2s,border-color .2s;" onmouseover="this.style.color='#fff';this.style.borderColor='rgba(255,255,255,.5)'" onmouseout="this.style.color='rgba(255,255,255,.5)';this.style.borderColor='rgba(255,255,255,.2)'">← 會員頁面</a>
    <span id="admin-email"></span>
  </div>
</div>

<div class="tab-bar">
  <button class="tab active" onclick="switchTab('members',this)">👥 會員管理</button>
  <button class="tab" onclick="switchTab('wod',this)">📋 課表編輯</button>
</div>

<div class="wrap">

  <!-- Members -->
  <div class="s active" id="s-members">
    <div class="search-wrap">
      <input id="member-search" type="text" placeholder="搜尋姓名…" class="search-input" oninput="filterMembers()">
    </div>
    <div class="member-filter-bar">
      <button class="mf-btn active" onclick="showMemberSection('pending')">待審核 <span class="mf-count" id="count-pending"></span></button>
      <button class="mf-btn" onclick="showMemberSection('approved')">已核准 <span class="mf-count" id="count-approved"></span></button>
      <button class="mf-btn" onclick="showMemberSection('expired')">已過期 <span class="mf-count mf-count-warn" id="count-expired"></span></button>
      <button class="mf-btn" onclick="showMemberSection('inactive')">停用／未通過 <span class="mf-count" id="count-inactive"></span></button>
    </div>

    <div id="ms-pending" class="member-section">
      <div class="table-wrap"><table class="member-table">
        <thead><tr>
          <th class="th-sort" onclick="sortMembers('pending','real_name')">姓名 <span id="sort-pending-real_name"></span></th>
          <th>Email</th><th>場館</th><th>性別</th>
          <th class="th-sort" onclick="sortMembers('pending','created_at')">申請時間 <span id="sort-pending-created_at"></span></th>
          <th>操作</th>
        </tr></thead>
        <tbody id="pending-list"></tbody>
      </table></div>
    </div>

    <div id="ms-approved" class="member-section" style="display:none;">
      <div class="table-wrap"><table class="member-table">
        <thead><tr>
          <th class="th-sort" onclick="sortMembers('approved','real_name')">姓名 <span id="sort-approved-real_name"></span></th>
          <th>Email</th><th>場館</th>
          <th class="th-sort" onclick="sortMembers('approved','last_login_at')">上次登入 <span id="sort-approved-last_login_at"></span></th>
          <th class="th-sort" onclick="sortMembers('approved','expires_at')">到期日 <span id="sort-approved-expires_at"></span></th>
          <th>狀態</th><th>操作</th>
        </tr></thead>
        <tbody id="approved-list"></tbody>
      </table></div>
    </div>

    <div id="ms-expired" class="member-section" style="display:none;">
      <p style="color:var(--ink-mute);font-size:11px;font-family:var(--mono);margin-bottom:14px;letter-spacing:.05em;">到期日已過的會員，確認後可直接停用。</p>
      <div class="table-wrap"><table class="member-table">
        <thead><tr>
          <th class="th-sort" onclick="sortMembers('expired','real_name')">姓名 <span id="sort-expired-real_name"></span></th>
          <th>Email</th><th>場館</th>
          <th class="th-sort" onclick="sortMembers('expired','last_login_at')">上次登入 <span id="sort-expired-last_login_at"></span></th>
          <th class="th-sort" onclick="sortMembers('expired','expires_at')">到期日 <span id="sort-expired-expires_at"></span></th>
          <th>操作</th>
        </tr></thead>
        <tbody id="expired-list"></tbody>
      </table></div>
    </div>

    <div id="ms-inactive" class="member-section" style="display:none;">
      <p style="color:var(--ink-mute);font-size:11px;font-family:var(--mono);margin-bottom:14px;letter-spacing:.05em;">購買課程後可直接在此核准，不需重新申請。</p>
      <div class="table-wrap"><table class="member-table">
        <thead><tr>
          <th class="th-sort" onclick="sortMembers('inactive','real_name')">姓名 <span id="sort-inactive-real_name"></span></th>
          <th>Email</th><th>場館</th><th>狀態</th><th>操作</th>
        </tr></thead>
        <tbody id="inactive-list"></tbody>
      </table></div>
    </div>
  </div>

  <!-- WOD Editor -->
  <div class="s" id="s-wod">
    <p style="color:var(--ink-mute);font-size:11px;font-family:var(--mono);margin-bottom:24px;line-height:1.8;letter-spacing:.04em;">
      直接編輯本週課表。修改後點「儲存全部課表」，學員即時看到更新。
    </p>
    <div id="wod-editor"></div>
    <button class="save-all-btn" onclick="saveAllWOD()">儲存全部課表 →</button>
    <span id="save-status"></span>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const ADMIN_EMAILS = ['simonchi0224@gmail.com', 'amysun101426@gmail.com'];

function formatLoginTime(ts) {
  if (!ts) return '從未登入';
  const d = new Date(ts);
  const now = new Date();
  const diffDays = Math.floor((now - d) / 86400000);
  if (diffDays === 0) return '今天 ' + d.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
  if (diffDays === 1) return '昨天';
  if (diffDays < 7) return `${diffDays} 天前`;
  return d.toLocaleDateString('zh-TW', { month: 'numeric', day: 'numeric' });
}
const LOC_LABEL = { xindian: '新店館', yonghe: '永和館' };
function formatLoc(loc) {
  return (loc||'').split(',').map(l => LOC_LABEL[l.trim()]||l).join(' · ');
}

let wodData = null;
let _roster = null;
let _membersData = { pending: [], approved: [], expired: [], inactive: [] };
let _sortState = {};
let _searchQuery = '';

async function loadRoster() {
  if (_roster) return;
  try {
    const r = await fetch('data/member_roster.json');
    const d = await r.json();
    _roster = d.members || [];
  } catch(e) { _roster = []; }
}

function rosterBadge(name) {
  if (!_roster || !name) return '';
  const clean = name.trim();
  const matches = _roster.filter(m => m.name === clean || m.name.includes(clean) || clean.includes(m.name));
  if (!matches.length)
    return `<div style="font-size:10px;color:#999;margin-top:4px;font-family:var(--mono);">✗ 合約名單查無此人</div>`;
  const today = new Date().toISOString().slice(0,10);
  const match = matches.find(m => m.is_group_class && m.expiry >= today)
             || matches.find(m => m.is_group_class)
             || matches[0];
  const active = match.expiry >= today;
  const type = match.is_group_class ? '團課' : '自主訓練';
  const color = match.is_group_class ? '#16a34a' : '#d97706';
  const icon = match.is_group_class ? '✓' : '△';
  const expLabel = active ? `到期 ${match.expiry}` : `⚠ 已到期 ${match.expiry}`;
  return `<div style="font-size:10px;color:${color};margin-top:4px;font-family:var(--mono);">${icon} ${match.location}・${type} · ${expLabel}</div>`;
}

function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.s').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('s-' + tab).classList.add('active');
}

async function googleLogin() {
  await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.href }
  });
}

async function init() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) {
    document.body.innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:20px;font-family:var(--mono);background:var(--ink);">
      <div style="color:#666;font-size:11px;letter-spacing:.1em;text-transform:uppercase;">4SC CrossFit · Admin</div>
      <button onclick="googleLogin()" style="padding:14px 32px;background:var(--accent);color:var(--ink);border:none;font-size:13px;font-weight:800;font-family:var(--mono);letter-spacing:.1em;text-transform:uppercase;cursor:pointer;">
        Google 登入 →
      </button>
    </div>`;
    return;
  }
  if (!ADMIN_EMAILS.includes(user.email)) {
    document.body.innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:8px;font-family:var(--mono);background:var(--ink);">
      <div style="color:#666;font-size:11px;letter-spacing:.1em;">⛔ 無存取權限</div>
      <div style="color:#444;font-size:10px;">${user.email}</div>
    </div>`;
    return;
  }
  document.getElementById('admin-email').textContent = user.email;
  await loadRoster();
  loadMembers();
  loadWODEditor();
}

async function saveNote(id, val) {
  await sb.from('members').update({ admin_notes: val }).eq('id', id);
}

async function saveName(id, el) {
  const newName = el.textContent.trim();
  if (!newName || newName === el.dataset.original) return;
  await sb.from('members').update({ real_name: newName }).eq('id', id);
  el.dataset.original = newName;
  loadMembers();
}

function filterMembers() {
  _searchQuery = document.getElementById('member-search').value.trim().toLowerCase();
  renderMembers();
}

function sortMembers(section, key) {
  const prev = _sortState[section];
  if (prev && prev.key === key) {
    _sortState[section] = { key, dir: prev.dir === 1 ? -1 : 1 };
  } else {
    _sortState[section] = { key, dir: 1 };
  }
  renderMembers();
}

function applySort(arr, section) {
  const s = _sortState[section];
  if (!s) return arr;
  return [...arr].sort((a, b) => {
    const av = a[s.key] || '';
    const bv = b[s.key] || '';
    return av < bv ? -s.dir : av > bv ? s.dir : 0;
  });
}

function applySearch(arr) {
  if (!_searchQuery) return arr;
  return arr.filter(m => (m.real_name || '').toLowerCase().includes(_searchQuery));
}

function updateSortIcons(section, keys) {
  keys.forEach(k => {
    const el = document.getElementById(`sort-${section}-${k}`);
    if (!el) return;
    const s = _sortState[section];
    el.textContent = (s && s.key === k) ? (s.dir === 1 ? ' ↑' : ' ↓') : '';
  });
}

function renderMembers() {
  const pending  = applySort(applySearch(_membersData.pending), 'pending');
  const approved = applySort(applySearch(_membersData.approved), 'approved');
  const expired  = applySort(applySearch(_membersData.expired), 'expired');
  const inactive = applySort(applySearch(_membersData.inactive), 'inactive');

  updateSortIcons('pending',  ['real_name','created_at']);
  updateSortIcons('approved', ['real_name','last_login_at','expires_at']);
  updateSortIcons('expired',  ['real_name','last_login_at','expires_at']);
  updateSortIcons('inactive', ['real_name']);

  document.getElementById('pending-list').innerHTML = pending.map(m => `
    <tr class="member-row">
      <td class="td-name">
        <strong contenteditable="true"
          style="outline:none;border-bottom:1px dashed #ccc;cursor:text;display:inline-block;min-width:40px;font-size:13px;"
          data-original="${m.real_name}"
          onblur="saveName('${m.id}', this)"
        >${m.real_name}</strong>
        <span style="font-size:10px;color:#bbb;margin-left:4px;" title="點擊姓名可直接編輯">✎</span>
        <div id="badge-${m.id}">${rosterBadge(m.real_name)}</div>
        <textarea rows="2" placeholder="備註…" class="note-textarea"
          onblur="saveNote('${m.id}', this.value)"
        >${m.admin_notes||''}</textarea>
      </td>
      <td class="td-email">${m.email}</td>
      <td>${formatLoc(m.location)}</td>
      <td style="font-size:12px;">${m.gender === 'male' ? '男' : '女'}</td>
      <td style="color:var(--ink-mute);font-size:11px;font-family:var(--mono);">${m.created_at?.split('T')[0]}</td>
      <td style="white-space:nowrap;">
        <button class="action-btn approve-btn" onclick="updateStatus('${m.id}','approved')">✓ 核准</button>
        <button class="action-btn reject-btn" onclick="updateStatus('${m.id}','rejected')">✕ 拒絕</button><br>
        <button class="action-btn" style="border-color:rgba(217,119,6,.4);color:#d97706;background:rgba(217,119,6,.06);margin-top:6px;" onclick="requestNameFix('${m.id}')">✎ 更正姓名</button>
      </td>
    </tr>`).join('') || `<tr><td colspan="6" class="empty-state">目前沒有待審核申請</td></tr>`;

  document.getElementById('approved-list').innerHTML = approved.map(m => `
    <tr class="member-row">
      <td class="td-name">
        <strong style="font-size:13px;">${m.real_name}</strong>
        ${rosterBadge(m.real_name)}
        ${m.admin_notes ? `<div style="margin-top:4px;font-size:10px;color:var(--ink-mute);font-family:var(--mono);white-space:normal;">${m.admin_notes}</div>` : ''}
      </td>
      <td class="td-email">${m.email}</td>
      <td>${formatLoc(m.location)}</td>
      <td style="color:var(--ink-mute);font-size:11px;font-family:var(--mono);">${formatLoginTime(m.last_login_at)}</td>
      <td>
        <input type="date" value="${m.expires_at||''}" class="date-input"
          onchange="saveExpiry('${m.id}', this.value)">
      </td>
      <td><span class="status-badge status-approved">已核准</span></td>
      <td>
        <button class="action-btn reject-btn" onclick="updateStatus('${m.id}','suspended')">停用</button>
      </td>
    </tr>`).join('') || `<tr><td colspan="7" class="empty-state">尚無會員</td></tr>`;

  document.getElementById('expired-list').innerHTML = expired.map(m => `
    <tr class="member-row" style="background:rgba(255,90,54,.03);">
      <td class="td-name"><strong style="font-size:13px;">${m.real_name}</strong></td>
      <td class="td-email">${m.email}</td>
      <td>${formatLoc(m.location)}</td>
      <td style="color:var(--ink-mute);font-size:11px;font-family:var(--mono);">${formatLoginTime(m.last_login_at)}</td>
      <td style="color:var(--warn);font-size:11px;font-family:var(--mono);font-weight:700;">${m.expires_at}</td>
      <td>
        <button class="action-btn reject-btn" onclick="updateStatus('${m.id}','suspended')">停用</button>
      </td>
    </tr>`).join('') || `<tr><td colspan="6" class="empty-state">目前沒有已過期會員</td></tr>`;

  document.getElementById('inactive-list').innerHTML = inactive.map(m => {
    const badge = m.status === 'suspended'
      ? `<span class="status-badge status-suspended">已停用</span>`
      : `<span class="status-badge status-rejected">未通過</span>`;
    return `<tr class="member-row">
      <td class="td-name">
        <strong style="font-size:13px;">${m.real_name}</strong>
        ${m.admin_notes ? `<div style="margin-top:4px;font-size:10px;color:var(--ink-mute);font-family:var(--mono);white-space:normal;">${m.admin_notes}</div>` : ''}
      </td>
      <td class="td-email">${m.email}</td>
      <td>${formatLoc(m.location)}</td>
      <td>${badge}</td>
      <td>
        <button class="action-btn approve-btn" onclick="updateStatus('${m.id}','approved')">核准加入</button>
      </td>
    </tr>`;
  }).join('') || `<tr><td colspan="5" class="empty-state">目前沒有停用或未通過會員</td></tr>`;
}

async function loadMembers() {
  const { data: pending } = await sb.from('members').select('*').eq('status', 'pending').order('created_at');
  const today = new Date().toISOString().split('T')[0];
  const { data: approved } = await sb.from('members').select('*').eq('status', 'approved')
    .or(`expires_at.is.null,expires_at.gte.${today}`);
  const { data: expired } = await sb.from('members').select('*').eq('status', 'approved')
    .lt('expires_at', today);
  const { data: inactive } = await sb.from('members')
    .select('*').in('status', ['suspended', 'rejected']);

  _membersData = {
    pending:  pending  || [],
    approved: approved || [],
    expired:  expired  || [],
    inactive: inactive || [],
  };

  document.getElementById('count-pending').textContent  = _membersData.pending.length  || '';
  document.getElementById('count-approved').textContent = _membersData.approved.length || '';
  document.getElementById('count-expired').textContent  = _membersData.expired.length  || '';
  document.getElementById('count-inactive').textContent = _membersData.inactive.length || '';

  renderMembers();
}

async function saveExpiry(id, val) {
  await sb.from('members').update({ expires_at: val || null }).eq('id', id);
}

function showMemberSection(key) {
  ['pending','approved','expired','inactive'].forEach(k => {
    document.getElementById('ms-' + k).style.display = k === key ? '' : 'none';
  });
  document.querySelectorAll('.mf-btn').forEach((btn, i) => {
    btn.classList.toggle('active', ['pending','approved','expired','inactive'][i] === key);
  });
}

async function updateStatus(id, status) {
  await sb.from('members').update({ status }).eq('id', id);
  loadMembers();
}

async function requestNameFix(id) {
  await sb.from('members').update({
    status: 'rejected',
    admin_notes: '姓名需更正｜請用場館合約上的真實姓名重新申請'
  }).eq('id', id);
  loadMembers();
}

function getWeekStart(dateStr) {
  const d = new Date(dateStr.replace(/-/g, '/'));
  const day = d.getDay();
  const diff = (day === 0 ? -6 : 1 - day);
  d.setDate(d.getDate() + diff);
  return d.toISOString().slice(0, 10);
}

function toggleWeek(weekKey) {
  const body = document.getElementById('week-body-' + weekKey);
  const icon = document.getElementById('week-icon-' + weekKey);
  const open = body.classList.contains('open');
  body.classList.toggle('open', !open);
  icon.textContent = open ? '▶' : '▼';
}

async function loadWODEditor() {
  const res = await fetch('data/wod.json');
  wodData = await res.json();
  const DAY_ZH = { MON:'週一', TUE:'週二', WED:'週三', THU:'週四', FRI:'週五', SAT:'週六', SUN:'週日' };

  const todayStr = new Date().toISOString().slice(0, 10);
  const currentWeekStart = getWeekStart(todayStr);

  const weeks = [];
  const weekMap = {};
  wodData.days.forEach((d, i) => {
    const ws = getWeekStart(d.date);
    if (!weekMap[ws]) {
      weekMap[ws] = { weekStart: ws, days: [] };
      weeks.push(weekMap[ws]);
    }
    weekMap[ws].days.push({ d, i });
  });

  document.getElementById('wod-editor').innerHTML = weeks.map(({ weekStart, days }) => {
    const isCurrentWeek = weekStart === currentWeekStart;
    const weekEnd = new Date(weekStart.replace(/-/g, '/'));
    weekEnd.setDate(weekEnd.getDate() + 6);
    const weekLabel = `${weekStart.slice(5)} ～ ${weekEnd.toISOString().slice(5, 10)}`;
    const weekKey = weekStart.replace(/-/g, '');

    const daysHtml = days.map(({ d, i }) => {
      const isToday = d.date === todayStr;
      return `
        <div class="wod-card${isToday ? ' today-card' : ''}">
          <div class="day-header">
            <div class="day-label${isToday ? ' is-today' : ''}">
              ${DAY_ZH[d.day]} · ${d.date}${isToday ? ' · TODAY' : ''}
            </div>
          </div>
          <div class="field-group">
            <div class="field-label">WOD 名稱</div>
            <input class="field-input" id="name-${i}" value="${d.name}">
          </div>
          <div class="field-group">
            <div class="field-label">類型標籤（BENCHMARK / PARTNER / HEAVY DAY 等，可空白）</div>
            <input class="field-input" id="tag-${i}" value="${d.tag || ''}">
          </div>
          <div class="field-group">
            <div class="field-label">訓練類型（For time / AMRAP X / EMOM X / For load）</div>
            <input class="field-input" id="type-${i}" value="${d.type}">
          </div>
          <div class="field-group">
            <div class="field-label">訓練內容</div>
            <textarea class="field-input" id="desc-${i}" rows="5">${d.description}</textarea>
          </div>
          <div class="field-group">
            <div class="field-label">教練備注（學員可見，可空白）</div>
            <input class="field-input" id="note-${i}" value="${d.coach_notes || ''}" placeholder="例：今天重點控速，不要衝重量">
          </div>
        </div>`;
    }).join('');

    return `
      <div class="week-group">
        <div class="week-header${isCurrentWeek ? ' current' : ''}" onclick="toggleWeek('${weekKey}')">
          <span>${isCurrentWeek ? '📍 本週 · ' : ''}${weekLabel}</span>
          <span id="week-icon-${weekKey}">${isCurrentWeek ? '▼' : '▶'}</span>
        </div>
        <div id="week-body-${weekKey}" class="week-body${isCurrentWeek ? ' open' : ''}">
          ${daysHtml}
        </div>
      </div>`;
  }).join('');
}

async function saveAllWOD() {
  const btn = document.querySelector('.save-all-btn');
  btn.textContent = '儲存中…';
  wodData.days.forEach((d, i) => {
    d.name = document.getElementById(`name-${i}`).value.trim();
    d.tag = document.getElementById(`tag-${i}`).value.trim();
    d.type = document.getElementById(`type-${i}`).value.trim();
    d.description = document.getElementById(`desc-${i}`).value.trim();
    d.coach_notes = document.getElementById(`note-${i}`).value.trim();
  });
  await sb.from('wod_cache').upsert({ id: 'current', data: wodData, updated_at: new Date().toISOString() });
  btn.textContent = '儲存全部課表 →';
  document.getElementById('save-status').textContent = '✓ 已儲存 ' + new Date().toLocaleTimeString('zh-TW');
}

init();
</script>
