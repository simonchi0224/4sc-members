<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教練後台｜4SC CrossFit</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --dark: #080d1a; --dark2: #0f1628; --dark3: #162040; --cyan: #22d3ee; --orange: #f97316; --green: #10b981; --red: #ef4444; --white: #f8fafc; --gray: #94a3b8; }
body { font-family: 'Noto Sans TC', sans-serif; background: var(--dark); color: var(--white); min-height: 100vh; }
.nav { background: rgba(8,13,26,0.95); border-bottom: 1px solid rgba(255,255,255,0.08); padding: 0 5%; display: flex; align-items: center; justify-content: space-between; height: 58px; }
.nav-logo { font-size: 0.95rem; font-weight: 900; }
.nav-logo span { color: var(--orange); }
.wrap { max-width: 860px; margin: 0 auto; padding: 40px 5%; }
.page-title { font-size: 1.4rem; font-weight: 900; margin-bottom: 32px; }
.section-title { font-size: 1rem; font-weight: 800; margin-bottom: 16px; color: var(--gray); letter-spacing: 0.5px; text-transform: uppercase; font-size: 0.78rem; }

/* Member table */
.member-table { width: 100%; border-collapse: collapse; }
.member-table th { text-align: left; font-size: 0.75rem; font-weight: 700; color: var(--gray); padding: 10px 16px; border-bottom: 1px solid rgba(255,255,255,0.08); letter-spacing: 0.5px; }
.member-row { border-bottom: 1px solid rgba(255,255,255,0.05); }
.member-row:hover { background: rgba(255,255,255,0.02); }
.member-row td { padding: 14px 16px; font-size: 0.88rem; vertical-align: middle; }
.status-badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 0.72rem; font-weight: 800; }
.status-pending { background: rgba(249,115,22,0.15); color: var(--orange); }
.status-approved { background: rgba(16,185,129,0.12); color: var(--green); }
.status-rejected { background: rgba(239,68,68,0.12); color: var(--red); }
.action-btn { padding: 6px 14px; border-radius: 8px; font-size: 0.78rem; font-weight: 700; border: none; cursor: pointer; font-family: inherit; margin-right: 6px; }
.approve-btn { background: rgba(16,185,129,0.15); color: var(--green); border: 1px solid rgba(16,185,129,0.3); }
.approve-btn:hover { background: var(--green); color: var(--dark); }
.reject-btn { background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
.reject-btn:hover { background: var(--red); color: var(--white); }
.empty-state { color: var(--gray); font-size: 0.88rem; padding: 32px 16px; }

/* WOD editor */
.wod-card { background: var(--dark2); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 24px; margin-bottom: 16px; }
.day-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.day-label { font-weight: 900; font-size: 0.95rem; }
.field-group { margin-bottom: 14px; }
.field-label { font-size: 0.72rem; font-weight: 700; color: var(--gray); margin-bottom: 6px; letter-spacing: 0.5px; }
.field-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 10px 12px; color: var(--white); font-size: 0.88rem; font-family: inherit; outline: none; resize: vertical; }
.field-input:focus { border-color: var(--cyan); }
.save-wod-btn { background: var(--cyan); color: var(--dark); border: none; border-radius: 8px; padding: 10px 20px; font-weight: 800; font-size: 0.85rem; cursor: pointer; font-family: inherit; }
.save-all-btn { background: var(--orange); color: var(--white); border: none; border-radius: 10px; padding: 14px 28px; font-weight: 800; font-size: 0.95rem; cursor: pointer; font-family: inherit; margin-top: 8px; }
.tab-bar { display: flex; gap: 8px; margin-bottom: 28px; }
.tab { padding: 9px 20px; border-radius: 999px; font-size: 0.82rem; font-weight: 700; background: var(--dark2); border: 1px solid rgba(255,255,255,0.08); color: var(--gray); cursor: pointer; }
.tab.active { background: var(--cyan); color: var(--dark); border-color: var(--cyan); }
.s { display: none; }
.s.active { display: block; }
#save-status { font-size: 0.82rem; color: var(--green); margin-left: 16px; }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">4SC <span>教練後台</span></div>
  <span id="admin-email" style="font-size:0.8rem;color:var(--gray);"></span>
</nav>

<div class="wrap">
  <h1 class="page-title">教練後台</h1>

  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('members')">👥 會員審核</div>
    <div class="tab" onclick="switchTab('wod')">📋 更新課表</div>
  </div>

  <!-- Members -->
  <div class="s active" id="s-members">
    <div class="section-title">待審核</div>
    <table class="member-table">
      <thead><tr><th>姓名</th><th>Email</th><th>場館</th><th>性別</th><th>申請時間</th><th>操作</th></tr></thead>
      <tbody id="pending-list"></tbody>
    </table>

    <div style="margin-top:36px;"></div>
    <div class="section-title">已核准會員</div>
    <table class="member-table">
      <thead><tr><th>姓名</th><th>Email</th><th>場館</th><th>狀態</th><th>操作</th></tr></thead>
      <tbody id="approved-list"></tbody>
    </table>
  </div>

  <!-- WOD Editor -->
  <div class="s" id="s-wod">
    <p style="color:var(--gray);font-size:0.85rem;margin-bottom:24px;line-height:1.7;">
      直接編輯本週課表。修改後點「儲存全部課表」，學員即時看到更新。<br>
      你也可以把截圖傳給 Claude，請他幫你更新這裡的資料。
    </p>
    <div id="wod-editor"></div>
    <button class="save-all-btn" onclick="saveAllWOD()">儲存全部課表 →</button>
    <span id="save-status"></span>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const ADMIN_EMAIL = 'simonchi0224@gmail.com';
const LOC_LABEL = { xindian: '新店館', yonghe: '永和館' };
let wodData = null;

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.s').forEach(s => s.classList.remove('active'));
  event.currentTarget.classList.add('active');
  document.getElementById('s-' + tab).classList.add('active');
}

async function init() {
  const { data: { user } } = await supabase.auth.getUser();
  if (!user || user.email !== ADMIN_EMAIL) {
    document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#94a3b8;font-family:sans-serif;">⛔ 無存取權限</div>';
    return;
  }
  document.getElementById('admin-email').textContent = user.email;
  loadMembers();
  loadWODEditor();
}

async function loadMembers() {
  const { data: pending } = await supabase.from('members').select('*').eq('status', 'pending').order('created_at');
  const { data: approved } = await supabase.from('members').select('*').eq('status', 'approved').order('real_name');

  const pendingHTML = (pending || []).map(m => `
    <tr class="member-row">
      <td><strong>${m.real_name}</strong></td>
      <td style="color:var(--gray)">${m.email}</td>
      <td>${LOC_LABEL[m.location] || m.location}</td>
      <td>${m.gender === 'male' ? '男' : '女'}</td>
      <td style="color:var(--gray);font-size:0.78rem">${m.created_at?.split('T')[0]}</td>
      <td>
        <button class="action-btn approve-btn" onclick="updateStatus('${m.id}','approved')">✓ 核准</button>
        <button class="action-btn reject-btn" onclick="updateStatus('${m.id}','rejected')">✕ 拒絕</button>
      </td>
    </tr>`).join('') || `<tr><td colspan="6" class="empty-state">目前沒有待審核申請</td></tr>`;

  const approvedHTML = (approved || []).map(m => `
    <tr class="member-row">
      <td><strong>${m.real_name}</strong></td>
      <td style="color:var(--gray)">${m.email}</td>
      <td>${LOC_LABEL[m.location] || m.location}</td>
      <td><span class="status-badge status-approved">已核准</span></td>
      <td>
        <button class="action-btn reject-btn" onclick="updateStatus('${m.id}','rejected')">停用</button>
      </td>
    </tr>`).join('') || `<tr><td colspan="5" class="empty-state">尚無會員</td></tr>`;

  document.getElementById('pending-list').innerHTML = pendingHTML;
  document.getElementById('approved-list').innerHTML = approvedHTML;
}

async function updateStatus(id, status) {
  await supabase.from('members').update({ status }).eq('id', id);
  loadMembers();
}

async function loadWODEditor() {
  const res = await fetch('data/wod.json');
  wodData = await res.json();
  const DAY_ZH = { MON:'週一', TUE:'週二', WED:'週三', THU:'週四', FRI:'週五', SAT:'週六', SUN:'週日' };

  document.getElementById('wod-editor').innerHTML = wodData.days.map((d, i) => `
    <div class="wod-card">
      <div class="day-header">
        <div class="day-label">${DAY_ZH[d.day]} ${d.date}</div>
      </div>
      <div class="field-group">
        <div class="field-label">WOD 名稱</div>
        <input class="field-input" id="name-${i}" value="${d.name}">
      </div>
      <div class="field-group">
        <div class="field-label">類型標籤（BENCHMARK / PARTNER / HEAVY DAY 等，可空白）</div>
        <input class="field-input" id="tag-${i}" value="${d.tag || ''}">
      </div>
      <div class="field-group">
        <div class="field-label">訓練類型（For time / AMRAP X / EMOM X / For load）</div>
        <input class="field-input" id="type-${i}" value="${d.type}">
      </div>
      <div class="field-group">
        <div class="field-label">訓練內容（直接貼上 CrossFit.com 的文字）</div>
        <textarea class="field-input" id="desc-${i}" rows="5">${d.description}</textarea>
      </div>
      <div class="field-group">
        <div class="field-label">教練備注（學員可見，可空白）</div>
        <input class="field-input" id="note-${i}" value="${d.coach_notes || ''}" placeholder="例：今天重點控速，不要衝重量">
      </div>
    </div>
  `).join('');
}

async function saveAllWOD() {
  const btn = document.querySelector('.save-all-btn');
  btn.textContent = '儲存中…';
  wodData.days.forEach((d, i) => {
    d.name = document.getElementById(`name-${i}`).value.trim();
    d.tag = document.getElementById(`tag-${i}`).value.trim();
    d.type = document.getElementById(`type-${i}`).value.trim();
    d.description = document.getElementById(`desc-${i}`).value.trim();
    d.coach_notes = document.getElementById(`note-${i}`).value.trim();
  });
  // Save to Supabase wod_cache table
  await supabase.from('wod_cache').upsert({ id: 'current', data: wodData, updated_at: new Date().toISOString() });
  btn.textContent = '儲存全部課表 →';
  document.getElementById('save-status').textContent = '✓ 已儲存 ' + new Date().toLocaleTimeString('zh-TW');
}

init();
</script>
</body>
</html>
