<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教練後台｜4SC CrossFit</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --dark: #080d1a; --dark2: #0f1628; --dark3: #162040; --cyan: #22d3ee; --orange: #f97316; --green: #10b981; --red: #ef4444; --white: #f8fafc; --gray: #94a3b8; }
body { font-family: 'Noto Sans TC', sans-serif; background: var(--dark); color: var(--white); min-height: 100vh; }
.nav { background: rgba(8,13,26,0.95); border-bottom: 1px solid rgba(255,255,255,0.08); padding: 0 5%; display: flex; align-items: center; justify-content: space-between; height: 58px; }
.nav-logo { font-size: 0.95rem; font-weight: 900; }
.nav-logo span { color: var(--orange); }
.wrap { max-width: 1200px; margin: 0 auto; padding: 40px 5%; }
.page-title { font-size: 1.4rem; font-weight: 900; margin-bottom: 32px; }
.section-title { font-size: 1rem; font-weight: 800; margin-bottom: 16px; color: var(--gray); letter-spacing: 0.5px; text-transform: uppercase; font-size: 0.78rem; }

/* Member table */
.table-wrap { overflow-x: auto; }
.member-table { width: 100%; border-collapse: collapse; min-width: 700px; }
.member-table th { text-align: left; font-size: 0.75rem; font-weight: 700; color: var(--gray); padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.08); letter-spacing: 0.5px; white-space: nowrap; }
.member-row { border-bottom: 1px solid rgba(255,255,255,0.05); }
.member-row:hover { background: rgba(255,255,255,0.02); }
.member-row td { padding: 12px 14px; font-size: 0.88rem; vertical-align: middle; white-space: nowrap; }
.member-row td.td-name { white-space: normal; min-width: 120px; max-width: 200px; }
.member-row td.td-email { color: var(--gray); font-size: 0.8rem; max-width: 200px; overflow: hidden; text-overflow: ellipsis; }
.status-badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 0.72rem; font-weight: 800; }
.status-pending { background: rgba(249,115,22,0.15); color: var(--orange); }
.status-approved { background: rgba(16,185,129,0.12); color: var(--green); }
.status-rejected { background: rgba(239,68,68,0.12); color: var(--red); }
.status-suspended { background: rgba(148,163,184,0.12); color: #94a3b8; }
.action-btn { padding: 6px 14px; border-radius: 8px; font-size: 0.78rem; font-weight: 700; border: none; cursor: pointer; font-family: inherit; margin-right: 6px; }
.approve-btn { background: rgba(16,185,129,0.15); color: var(--green); border: 1px solid rgba(16,185,129,0.3); }
.approve-btn:hover { background: var(--green); color: var(--dark); }
.reject-btn { background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
.reject-btn:hover { background: var(--red); color: var(--white); }
.empty-state { color: var(--gray); font-size: 0.88rem; padding: 32px 16px; }
.member-filter-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.08); }
.mf-btn { padding: 10px 20px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.04); color: var(--gray); font-size: 0.9rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.15s; }
.mf-btn:hover { border-color: rgba(255,255,255,0.25); color: var(--white); }
.mf-btn.active { background: rgba(34,211,238,0.15); border-color: rgba(34,211,238,0.5); color: var(--cyan); }
.mf-count { display: inline-block; background: rgba(255,255,255,0.12); border-radius: 999px; padding: 2px 8px; font-size: 0.75rem; margin-left: 6px; font-weight: 800; }
.mf-count-warn { background: rgba(239,68,68,0.25); color: #f87171; }

/* WOD editor */
.wod-card { background: var(--dark2); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 24px; margin-bottom: 16px; }
.day-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.day-label { font-weight: 900; font-size: 0.95rem; }
.field-group { margin-bottom: 14px; }
.field-label { font-size: 0.72rem; font-weight: 700; color: var(--gray); margin-bottom: 6px; letter-spacing: 0.5px; }
.field-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 10px 12px; color: var(--white); font-size: 0.88rem; font-family: inherit; outline: none; resize: vertical; }
.field-input:focus { border-color: var(--cyan); }
.save-wod-btn { background: var(--cyan); color: var(--dark); border: none; border-radius: 8px; padding: 10px 20px; font-weight: 800; font-size: 0.85rem; cursor: pointer; font-family: inherit; }
.save-all-btn { background: var(--orange); color: var(--white); border: none; border-radius: 10px; padding: 14px 28px; font-weight: 800; font-size: 0.95rem; cursor: pointer; font-family: inherit; margin-top: 8px; }
.tab-bar { display: flex; gap: 8px; margin-bottom: 28px; }
.tab { padding: 9px 20px; border-radius: 999px; font-size: 0.82rem; font-weight: 700; background: var(--dark2); border: 1px solid rgba(255,255,255,0.08); color: var(--gray); cursor: pointer; }
.tab.active { background: var(--cyan); color: var(--dark); border-color: var(--cyan); }
.s { display: none; }
.s.active { display: block; }
#save-status { font-size: 0.82rem; color: var(--green); margin-left: 16px; }
.th-sort { cursor: pointer; user-select: none; white-space: nowrap; }
.th-sort:hover { color: var(--white); }
#member-search:focus { border-color: var(--cyan); }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">4SC <span>教練後台</span></div>
  <span id="admin-email" style="font-size:0.8rem;color:var(--gray);"></span>
</nav>

<div class="wrap">
  <h1 class="page-title">教練後台</h1>

  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('members', this)">👥 會員管理</div>
    <div class="tab" onclick="switchTab('wod', this)">📋 課表編輯</div>
  </div>

  <!-- Members -->
  <div class="s active" id="s-members">
    <!-- Search -->
    <div style="margin-bottom:16px;">
      <input id="member-search" type="text" placeholder="🔍  搜尋姓名…" oninput="filterMembers()"
        style="width:100%;padding:10px 16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:10px;color:var(--white);font-size:0.9rem;font-family:inherit;outline:none;">
    </div>
    <!-- Filter tabs -->
    <div class="member-filter-bar">
      <button class="mf-btn active" onclick="showMemberSection('pending')">待審核 <span class="mf-count" id="count-pending"></span></button>
      <button class="mf-btn" onclick="showMemberSection('approved')">已核准 <span class="mf-count" id="count-approved"></span></button>
      <button class="mf-btn" onclick="showMemberSection('expired')">已過期 <span class="mf-count mf-count-warn" id="count-expired"></span></button>
      <button class="mf-btn" onclick="showMemberSection('inactive')">停用／未通過 <span class="mf-count" id="count-inactive"></span></button>
    </div>

    <div id="ms-pending" class="member-section">
      <div class="table-wrap"><table class="member-table">
        <thead><tr>
          <th class="th-sort" onclick="sortMembers('pending','real_name')">姓名 <span id="sort-pending-real_name"></span></th>
          <th>Email</th><th>場館</th><th>性別</th>
          <th class="th-sort" onclick="sortMembers('pending','created_at')">申請時間 <span id="sort-pending-created_at"></span></th>
          <th>操作</th>
        </tr></thead>
        <tbody id="pending-list"></tbody>
      </table></div>
    </div>

    <div id="ms-approved" class="member-section" style="display:none;">
      <div class="table-wrap"><table class="member-table">
        <thead><tr>
          <th class="th-sort" onclick="sortMembers('approved','real_name')">姓名 <span id="sort-approved-real_name"></span></th>
          <th>Email</th><th>場館</th>
          <th class="th-sort" onclick="sortMembers('approved','last_login_at')">上次登入 <span id="sort-approved-last_login_at"></span></th>
          <th class="th-sort" onclick="sortMembers('approved','expires_at')">到期日 <span id="sort-approved-expires_at"></span></th>
          <th>狀態</th><th>操作</th>
        </tr></thead>
        <tbody id="approved-list"></tbody>
      </table></div>
    </div>

    <div id="ms-expired" class="member-section" style="display:none;">
      <p style="color:var(--gray);font-size:0.8rem;margin-bottom:12px;">到期日已過的會員，確認後可直接停用。</p>
      <div class="table-wrap"><table class="member-table">
        <thead><tr>
          <th class="th-sort" onclick="sortMembers('expired','real_name')">姓名 <span id="sort-expired-real_name"></span></th>
          <th>Email</th><th>場館</th>
          <th class="th-sort" onclick="sortMembers('expired','last_login_at')">上次登入 <span id="sort-expired-last_login_at"></span></th>
          <th class="th-sort" onclick="sortMembers('expired','expires_at')">到期日 <span id="sort-expired-expires_at"></span></th>
          <th>操作</th>
        </tr></thead>
        <tbody id="expired-list"></tbody>
      </table></div>
    </div>

    <div id="ms-inactive" class="member-section" style="display:none;">
      <p style="color:var(--gray);font-size:0.8rem;margin-bottom:12px;">購買課程後可直接在此核准，不需重新申請。</p>
      <div class="table-wrap"><table class="member-table">
        <thead><tr>
          <th class="th-sort" onclick="sortMembers('inactive','real_name')">姓名 <span id="sort-inactive-real_name"></span></th>
          <th>Email</th><th>場館</th><th>狀態</th><th>操作</th>
        </tr></thead>
        <tbody id="inactive-list"></tbody>
      </table></div>
    </div>
  </div>

  <!-- WOD Editor -->
  <div class="s" id="s-wod">
    <p style="color:var(--gray);font-size:0.85rem;margin-bottom:24px;line-height:1.7;">
      直接編輯本週課表。修改後點「儲存全部課表」，學員即時看到更新。<br>
      你也可以把截圖傳給 Claude，請他幫你更新這裡的資料。
    </p>
    <div id="wod-editor"></div>
    <button class="save-all-btn" onclick="saveAllWOD()">儲存全部課表 →</button>
    <span id="save-status"></span>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const ADMIN_EMAILS = ['simonchi0224@gmail.com', 'amysun101426@gmail.com'];

function formatLoginTime(ts) {
  if (!ts) return '從未登入';
  const d = new Date(ts);
  const now = new Date();
  const diffDays = Math.floor((now - d) / 86400000);
  if (diffDays === 0) return '今天 ' + d.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
  if (diffDays === 1) return '昨天';
  if (diffDays < 7) return `${diffDays} 天前`;
  return d.toLocaleDateString('zh-TW', { month: 'numeric', day: 'numeric' });
}
const LOC_LABEL = { xindian: '新店館', yonghe: '永和館' };
function formatLoc(loc) {
  return (loc||'').split(',').map(l => LOC_LABEL[l.trim()]||l).join(' · ');
}

let wodData = null;
let _roster = null;
let _membersData = { pending: [], approved: [], expired: [], inactive: [] };
let _sortState = {};
let _searchQuery = '';

async function loadRoster() {
  if (_roster) return;
  try {
    const r = await fetch('data/member_roster.json');
    const d = await r.json();
    _roster = d.members || [];
  } catch(e) { _roster = []; }
}

function rosterBadge(name) {
  if (!_roster || !name) return '';
  const clean = name.trim();
  const matches = _roster.filter(m => m.name === clean || m.name.includes(clean) || clean.includes(m.name));
  if (!matches.length)
    return `<div style="font-size:0.68rem;color:#64748b;margin-top:3px;">✗ 合約名單查無此人</div>`;
  const today = new Date().toISOString().slice(0,10);
  const match = matches.find(m => m.is_group_class && m.expiry >= today)
             || matches.find(m => m.is_group_class)
             || matches[0];
  const active = match.expiry >= today;
  const type = match.is_group_class ? '團課' : '自主訓練';
  const color = match.is_group_class ? '#a6e635' : '#d9a55c';
  const icon = match.is_group_class ? '✓' : '△';
  const expLabel = active ? `到期 ${match.expiry}` : `⚠ 已到期 ${match.expiry}`;
  return `<div style="font-size:0.68rem;color:${color};margin-top:3px;">${icon} ${match.location}・${type} · ${expLabel}</div>`;
}

function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.s').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('s-' + tab).classList.add('active');
}

async function googleLogin() {
  await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.href }
  });
}

async function init() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) {
    document.body.innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;font-family:sans-serif;background:#0a0f1e;">
      <div style="color:#94a3b8;font-size:0.9rem;">4SC CrossFit 管理後台</div>
      <button onclick="googleLogin()" style="padding:12px 28px;background:#22d3ee;color:#0a0f1e;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;">
        Google 登入
      </button>
    </div>`;
    return;
  }
  if (!ADMIN_EMAILS.includes(user.email)) {
    document.body.innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:8px;color:#94a3b8;font-family:sans-serif;background:#0a0f1e;">
      <div>⛔ 無存取權限</div>
      <div style="font-size:0.8rem;">${user.email}</div>
    </div>`;
    return;
  }
  document.getElementById('admin-email').textContent = user.email;
  await loadRoster();
  loadMembers();
  loadWODEditor();
}

async function saveNote(id, val) {
  await sb.from('members').update({ admin_notes: val }).eq('id', id);
}

async function saveName(id, el) {
  const newName = el.textContent.trim();
  if (!newName || newName === el.dataset.original) return;
  await sb.from('members').update({ real_name: newName }).eq('id', id);
  el.dataset.original = newName;
  loadMembers();
}

function filterMembers() {
  _searchQuery = document.getElementById('member-search').value.trim().toLowerCase();
  renderMembers();
}

function sortMembers(section, key) {
  const prev = _sortState[section];
  if (prev && prev.key === key) {
    _sortState[section] = { key, dir: prev.dir === 1 ? -1 : 1 };
  } else {
    _sortState[section] = { key, dir: 1 };
  }
  renderMembers();
}

function applySort(arr, section) {
  const s = _sortState[section];
  if (!s) return arr;
  return [...arr].sort((a, b) => {
    const av = a[s.key] || '';
    const bv = b[s.key] || '';
    return av < bv ? -s.dir : av > bv ? s.dir : 0;
  });
}

function applySearch(arr) {
  if (!_searchQuery) return arr;
  return arr.filter(m => (m.real_name || '').toLowerCase().includes(_searchQuery));
}

function updateSortIcons(section, keys) {
  keys.forEach(k => {
    const el = document.getElementById(`sort-${section}-${k}`);
    if (!el) return;
    const s = _sortState[section];
    el.textContent = (s && s.key === k) ? (s.dir === 1 ? ' ↑' : ' ↓') : '';
  });
}

function renderMembers() {
  const noteStyle = `width:100%;margin-top:6px;padding:5px 8px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:5px;color:#94a3b8;font-size:0.72rem;font-family:monospace;resize:none;outline:none;`;

  const pending  = applySort(applySearch(_membersData.pending), 'pending');
  const approved = applySort(applySearch(_membersData.approved), 'approved');
  const expired  = applySort(applySearch(_membersData.expired), 'expired');
  const inactive = applySort(applySearch(_membersData.inactive), 'inactive');

  updateSortIcons('pending',  ['real_name','created_at']);
  updateSortIcons('approved', ['real_name','last_login_at','expires_at']);
  updateSortIcons('expired',  ['real_name','last_login_at','expires_at']);
  updateSortIcons('inactive', ['real_name']);

  document.getElementById('pending-list').innerHTML = pending.map(m => `
    <tr class="member-row">
      <td class="td-name">
        <strong contenteditable="true"
          style="outline:none;border-bottom:1px dashed rgba(255,255,255,0.2);cursor:text;display:inline-block;min-width:40px;"
          data-original="${m.real_name}"
          onblur="saveName('${m.id}', this)"
        >${m.real_name}</strong>
        <span style="font-size:0.62rem;color:#475569;margin-left:4px;" title="點擊姓名可直接編輯">✎</span>
        <div id="badge-${m.id}">${rosterBadge(m.real_name)}</div>
        <textarea rows="2" placeholder="備註…" style="${noteStyle}"
          onblur="saveNote('${m.id}', this.value)"
        >${m.admin_notes||''}</textarea>
      </td>
      <td class="td-email">${m.email}</td>
      <td>${formatLoc(m.location)}</td>
      <td>${m.gender === 'male' ? '男' : '女'}</td>
      <td style="color:var(--gray);font-size:0.78rem">${m.created_at?.split('T')[0]}</td>
      <td style="white-space:nowrap;">
        <button class="action-btn approve-btn" onclick="updateStatus('${m.id}','approved')">✓ 核准</button>
        <button class="action-btn reject-btn" onclick="updateStatus('${m.id}','rejected')">✕ 拒絕</button><br>
        <button class="action-btn" style="background:rgba(234,179,8,0.1);color:#eab308;border:1px solid rgba(234,179,8,0.25);margin-top:4px;" onclick="requestNameFix('${m.id}')">✎ 更正姓名</button>
      </td>
    </tr>`).join('') || `<tr><td colspan="6" class="empty-state">目前沒有待審核申請</td></tr>`;

  document.getElementById('approved-list').innerHTML = approved.map(m => `
    <tr class="member-row">
      <td class="td-name">
        <strong>${m.real_name}</strong>
        ${rosterBadge(m.real_name)}
        ${m.admin_notes ? `<div style="margin-top:4px;font-size:0.7rem;color:#64748b;font-family:monospace;white-space:normal;">${m.admin_notes}</div>` : ''}
      </td>
      <td class="td-email">${m.email}</td>
      <td>${formatLoc(m.location)}</td>
      <td style="color:var(--gray);font-size:0.78rem;">${formatLoginTime(m.last_login_at)}</td>
      <td>
        <input type="date" value="${m.expires_at||''}"
          style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:#94a3b8;font-size:0.78rem;padding:4px 8px;font-family:monospace;"
          onchange="saveExpiry('${m.id}', this.value)">
      </td>
      <td><span class="status-badge status-approved">已核准</span></td>
      <td>
        <button class="action-btn reject-btn" onclick="updateStatus('${m.id}','suspended')">停用</button>
      </td>
    </tr>`).join('') || `<tr><td colspan="7" class="empty-state">尚無會員</td></tr>`;

  document.getElementById('expired-list').innerHTML = expired.map(m => `
    <tr class="member-row" style="background:rgba(239,68,68,0.04);">
      <td class="td-name"><strong>${m.real_name}</strong></td>
      <td class="td-email">${m.email}</td>
      <td>${formatLoc(m.location)}</td>
      <td style="color:var(--gray);font-size:0.78rem;">${formatLoginTime(m.last_login_at)}</td>
      <td style="color:#f87171;font-size:0.78rem;font-family:monospace;">${m.expires_at}</td>
      <td>
        <button class="action-btn reject-btn" onclick="updateStatus('${m.id}','suspended')">停用</button>
      </td>
    </tr>`).join('') || `<tr><td colspan="6" class="empty-state">目前沒有已過期會員</td></tr>`;

  document.getElementById('inactive-list').innerHTML = inactive.map(m => {
    const badge = m.status === 'suspended'
      ? `<span class="status-badge status-suspended">已停用</span>`
      : `<span class="status-badge status-rejected">未通過</span>`;
    return `<tr class="member-row">
      <td class="td-name">
        <strong>${m.real_name}</strong>
        ${m.admin_notes ? `<div style="margin-top:4px;font-size:0.7rem;color:#64748b;font-family:monospace;white-space:normal;">${m.admin_notes}</div>` : ''}
      </td>
      <td class="td-email">${m.email}</td>
      <td>${formatLoc(m.location)}</td>
      <td>${badge}</td>
      <td>
        <button class="action-btn approve-btn" onclick="updateStatus('${m.id}','approved')">核准加入</button>
      </td>
    </tr>`;
  }).join('') || `<tr><td colspan="5" class="empty-state">目前沒有停用或未通過會員</td></tr>`;
}

async function loadMembers() {
  const { data: pending } = await sb.from('members').select('*').eq('status', 'pending').order('created_at');
  const today = new Date().toISOString().split('T')[0];
  const { data: approved } = await sb.from('members').select('*').eq('status', 'approved')
    .or(`expires_at.is.null,expires_at.gte.${today}`);
  const { data: expired } = await sb.from('members').select('*').eq('status', 'approved')
    .lt('expires_at', today);
  const { data: inactive } = await sb.from('members')
    .select('*').in('status', ['suspended', 'rejected']);

  _membersData = {
    pending:  pending  || [],
    approved: approved || [],
    expired:  expired  || [],
    inactive: inactive || [],
  };

  document.getElementById('count-pending').textContent  = _membersData.pending.length  || '';
  document.getElementById('count-approved').textContent = _membersData.approved.length || '';
  document.getElementById('count-expired').textContent  = _membersData.expired.length  || '';
  document.getElementById('count-inactive').textContent = _membersData.inactive.length || '';

  renderMembers();
}

async function saveExpiry(id, val) {
  await sb.from('members').update({ expires_at: val || null }).eq('id', id);
}

function showMemberSection(key) {
  ['pending','approved','expired','inactive'].forEach(k => {
    document.getElementById('ms-' + k).style.display = k === key ? '' : 'none';
  });
  document.querySelectorAll('.mf-btn').forEach((btn, i) => {
    btn.classList.toggle('active', ['pending','approved','expired','inactive'][i] === key);
  });
}

async function updateStatus(id, status) {
  await sb.from('members').update({ status }).eq('id', id);
  loadMembers();
}

async function requestNameFix(id) {
  await sb.from('members').update({
    status: 'rejected',
    admin_notes: '姓名需更正｜請用場館合約上的真實姓名重新申請'
  }).eq('id', id);
  loadMembers();
}

function getWeekStart(dateStr) {
  const d = new Date(dateStr.replace(/-/g, '/'));
  const day = d.getDay();
  const diff = (day === 0 ? -6 : 1 - day);
  d.setDate(d.getDate() + diff);
  return d.toISOString().slice(0, 10);
}

function toggleWeek(weekKey) {
  const body = document.getElementById('week-body-' + weekKey);
  const icon = document.getElementById('week-icon-' + weekKey);
  const open = body.style.display !== 'none';
  body.style.display = open ? 'none' : 'block';
  icon.textContent = open ? '▶' : '▼';
}

async function loadWODEditor() {
  const res = await fetch('data/wod.json');
  wodData = await res.json();
  const DAY_ZH = { MON:'週一', TUE:'週二', WED:'週三', THU:'週四', FRI:'週五', SAT:'週六', SUN:'週日' };

  const todayStr = new Date().toISOString().slice(0, 10);
  const currentWeekStart = getWeekStart(todayStr);

  // Group days by week
  const weeks = [];
  const weekMap = {};
  wodData.days.forEach((d, i) => {
    const ws = getWeekStart(d.date);
    if (!weekMap[ws]) {
      weekMap[ws] = { weekStart: ws, days: [] };
      weeks.push(weekMap[ws]);
    }
    weekMap[ws].days.push({ d, i });
  });

  document.getElementById('wod-editor').innerHTML = weeks.map(({ weekStart, days }) => {
    const isCurrentWeek = weekStart === currentWeekStart;
    const weekEnd = new Date(weekStart.replace(/-/g, '/'));
    weekEnd.setDate(weekEnd.getDate() + 6);
    const weekLabel = `${weekStart.slice(5)} ～ ${weekEnd.toISOString().slice(5, 10)}`;
    const weekKey = weekStart.replace(/-/g, '');
    const hasToday = days.some(({ d }) => d.date === todayStr);

    const daysHtml = days.map(({ d, i }) => {
      const isToday = d.date === todayStr;
      return `
        <div class="wod-card" style="${isToday ? 'border-color:rgba(34,211,238,0.4);' : ''}">
          <div class="day-header">
            <div class="day-label" style="${isToday ? 'color:var(--cyan);' : ''}">
              ${isToday ? '● ' : ''}${DAY_ZH[d.day]} ${d.date}${isToday ? ' · 今天' : ''}
            </div>
          </div>
          <div class="field-group">
            <div class="field-label">WOD 名稱</div>
            <input class="field-input" id="name-${i}" value="${d.name}">
          </div>
          <div class="field-group">
            <div class="field-label">類型標籤（BENCHMARK / PARTNER / HEAVY DAY 等，可空白）</div>
            <input class="field-input" id="tag-${i}" value="${d.tag || ''}">
          </div>
          <div class="field-group">
            <div class="field-label">訓練類型（For time / AMRAP X / EMOM X / For load）</div>
            <input class="field-input" id="type-${i}" value="${d.type}">
          </div>
          <div class="field-group">
            <div class="field-label">訓練內容（直接貼上 CrossFit.com 的文字）</div>
            <textarea class="field-input" id="desc-${i}" rows="5">${d.description}</textarea>
          </div>
          <div class="field-group">
            <div class="field-label">教練備注（學員可見，可空白）</div>
            <input class="field-input" id="note-${i}" value="${d.coach_notes || ''}" placeholder="例：今天重點控速，不要衝重量">
          </div>
        </div>`;
    }).join('');

    return `
      <div style="margin-bottom:8px;border:1px solid rgba(255,255,255,0.08);border-radius:12px;overflow:hidden;">
        <div onclick="toggleWeek('${weekKey}')"
             style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px;cursor:pointer;background:${isCurrentWeek ? 'rgba(34,211,238,0.08)' : 'rgba(255,255,255,0.03)'};user-select:none;">
          <div style="font-weight:800;font-size:0.88rem;${isCurrentWeek ? 'color:var(--cyan);' : 'color:var(--white);'}">
            ${isCurrentWeek ? '📍 本週 · ' : ''}${weekLabel}
            ${hasToday ? ' <span style="font-size:0.72rem;background:rgba(34,211,238,0.2);color:var(--cyan);padding:2px 8px;border-radius:999px;margin-left:6px;">今天</span>' : ''}
          </div>
          <span id="week-icon-${weekKey}" style="font-size:0.75rem;color:var(--gray);">${isCurrentWeek ? '▼' : '▶'}</span>
        </div>
        <div id="week-body-${weekKey}" style="display:${isCurrentWeek ? 'block' : 'none'};padding:12px;">
          ${daysHtml}
        </div>
      </div>`;
  }).join('');
}

async function saveAllWOD() {
  const btn = document.querySelector('.save-all-btn');
  btn.textContent = '儲存中…';
  wodData.days.forEach((d, i) => {
    d.name = document.getElementById(`name-${i}`).value.trim();
    d.tag = document.getElementById(`tag-${i}`).value.trim();
    d.type = document.getElementById(`type-${i}`).value.trim();
    d.description = document.getElementById(`desc-${i}`).value.trim();
    d.coach_notes = document.getElementById(`note-${i}`).value.trim();
  });
  // Save to Supabase wod_cache table
  await sb.from('wod_cache').upsert({ id: 'current', data: wodData, updated_at: new Date().toISOString() });
  btn.textContent = '儲存全部課表 →';
  document.getElementById('save-status').textContent = '✓ 已儲存 ' + new Date().toLocaleTimeString('zh-TW');
}

init();
</script>
